<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Validação de Acesso</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: #e5e7eb;
    }
    .card {
      width: min(420px, 92vw);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
    }
    h1 { margin: 0 0 14px; font-size: 1.25rem; }
    p  { margin: 0 0 18px; opacity: .9; }

    label { display: block; font-size: .95rem; margin-bottom: 8px; }
    input[type="password"]{
      width: 100%;
      box-sizing: border-box;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.25);
      color: inherit;
      outline: none;
    }
    input[type="password"]:focus{
      border-color: rgba(99,102,241,0.8);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.18);
    }

    button{
      width: 100%;
      margin-top: 12px;
      padding: 12px 14px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      background: #6366f1;
      color: white;
      transition: transform .05s ease, filter .15s ease;
    }
    button:active{ transform: translateY(1px); }
    button:hover{ filter: brightness(1.08); }

    /* --- VALIDAÇÃO APENAS COM HTML+CSS --- */

    /* Mensagens escondidas por padrão */
    .msg {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      text-align: center;
      border: 1px solid transparent;
    }

    /* Se o formulário estiver inválido (ex: padrão do campo não bate), mostra "negado" */
    form:has(input:invalid) .negado {
      display: block;
      background: rgba(239,68,68,0.18);
      border-color: rgba(239,68,68,0.45);
      color: #fecaca;
    }

    /* Se o formulário estiver válido, mostra "concedido" */
    form:has(input:valid) .concedido {
      display: block;
      background: rgba(34,197,94,0.18);
      border-color: rgba(34,197,94,0.45);
      color: #bbf7d0;
    }

    /* Ajuda visual de erro quando inválido */
    form:has(input:invalid) input{
      border-color: rgba(239,68,68,0.55);
    }

    .hint{
      margin-top: 10px;
      font-size: .85rem;
      opacity: .8;
      line-height: 1.35;
    }
    code{
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Validação de acesso</h1>
    <p>Digite a senha para validar.</p>

    <!--
      Validação sem JavaScript:
      - required: não pode ficar vazio
      - pattern: precisa bater com o padrão exato.
      Troque "1234" pela senha desejada.
    -->
    <form>
      <label for="senha">Senha</label>
      <input
        id="senha"
        name="senha"
        type="password"
        inputmode="numeric"
        placeholder="Ex: 1234"
        required
        pattern="1234"
        title="Senha incorreta."
        autocomplete="off"
      />

      <button type="submit">Validar</button>

      <div class="msg concedido">ACESSO CONCEDIDO</div>
      <div class="msg negado">ACESSO NEGADO</div>

      <div class="hint">
        A senha deste exemplo é <code>1234</code>. Para mudar, edite o
        <code>pattern</code> do input.
      </div>
    </form>
  </main>
</body>
</html>
